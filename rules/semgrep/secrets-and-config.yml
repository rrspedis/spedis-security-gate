rules:
  - id: env-var-secret-hardcoded-fallback
    message: |
      Hardcoded fallback for a secret-class env var. Secrets must fail-closed.
      Pattern: `process.env.SOMETHING_SECRET ?? "some-value"` in production code
      means the app silently uses "some-value" when the env var is missing — the
      exact anti-pattern that caused the dev-secret HMAC bug in Adscory.
      Fix:
        const x = process.env.X;
        if (!x) throw new Error("X is required");
    severity: ERROR
    languages: [typescript, javascript]
    pattern-either:
      - pattern: |
          process.env.$VAR ?? "$FALLBACK"
      - pattern: |
          process.env.$VAR ?? '$FALLBACK'
      - pattern: |
          process.env.$VAR || "$FALLBACK"
      - pattern: |
          process.env.$VAR || '$FALLBACK'
    pattern-not: |
      process.env.$VAR ?? ""
    pattern-not: |
      process.env.$VAR ?? ''
    pattern-not: |
      process.env.$VAR || ""
    pattern-not: |
      process.env.$VAR || ''
    metavariable-regex:
      metavariable: $VAR
      regex: '.*(SECRET|PASSWORD|PASSWD|TOKEN|API_?KEY|PRIVATE_KEY|ENCRYPTION_KEY|CREDENTIAL|HMAC|JWT|STRIPE|ANTHROPIC|OPENAI|META_ACCESS|FACEBOOK_ACCESS|GOOGLE_CLIENT|GOOGLE_SECRET|AWS_SECRET|AWS_ACCESS|ZOHO_CLIENT|ZOHO_REFRESH).*'
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/vitest.config.*"
        - "**/jest.config.*"

  - id: env-var-infra-hardcoded-fallback
    message: |
      Infrastructure URL with hardcoded fallback. OK for local dev, but in
      production if this env var is missing, the app silently connects to
      localhost and the service fails without alerting. Consider: fail-closed
      in production.
      Recommended pattern:
        const url = process.env.REDIS_URL
          ?? (process.env.NODE_ENV === 'production'
              ? (() => { throw new Error('REDIS_URL required in prod') })()
              : 'redis://localhost:6379');
    severity: WARNING
    languages: [typescript, javascript]
    pattern-either:
      - pattern: |
          process.env.$VAR ?? "$FALLBACK"
      - pattern: |
          process.env.$VAR ?? '$FALLBACK'
      - pattern: |
          process.env.$VAR || "$FALLBACK"
      - pattern: |
          process.env.$VAR || '$FALLBACK'
    metavariable-regex:
      metavariable: $VAR
      regex: '^(REDIS_URL|DATABASE_URL|POSTGRES_URL|POSTGRESQL_URL|MONGODB_URL|MONGO_URL|AMQP_URL|RABBITMQ_URL|KAFKA_URL|BROKER_URL|QUEUE_URL|ELASTICSEARCH_URL|ELASTIC_URL)$'
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"

  - id: dev-secret-fallback
    message: |
      Detected 'dev-', 'test-', 'changeme' or 'insecure' fallback for a secret.
      This is the exact pattern that caused the HMAC bug in Adscory.
      Remove the fallback entirely — fail at startup if missing.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-regex: '(?i)(?:\|\||\?\?)\s*["''](dev-|test-|changeme|your-secret|default-secret|insecure|placeholder|replace-me|xxx)'
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"

  - id: hardcoded-api-key-pattern
    message: |
      Hardcoded API key detected in source. Move to env var.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-regex: '(?i)(api[_-]?key|apikey|secret[_-]?key|private[_-]?key)\s*[:=]\s*["''](?!process\.env)[A-Za-z0-9_-]{16,}["'']'
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"

  - id: secret-in-logger
    message: |
      Logger statement appears to log a secret/token/password.
      Configure your logger with a redact config for these fields.
    severity: WARNING
    languages: [typescript, javascript]
    pattern-regex: '(?i)(?:console\.|logger\.|log\.)[a-z]+\([^)]*(password|secret|token|api_key|authorization|cookie)'
