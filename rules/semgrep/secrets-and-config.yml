rules:
  - id: env-var-hardcoded-fallback
    message: |
      Hardcoded fallback for env var. Secrets and config must fail-closed.
      Replace with: const x = process.env.X; if (!x) throw new Error("X required");
      Applies especially to: JWT_SECRET, API_KEY, ENCRYPTION_KEY, DATABASE_URL,
      any *_SECRET, any *_TOKEN.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-either:
      - pattern: process.env.$VAR ?? "$FALLBACK"
      - pattern: process.env.$VAR ?? '$FALLBACK'
      - pattern: process.env.$VAR || "$FALLBACK"
      - pattern: process.env.$VAR || '$FALLBACK'
    pattern-not: process.env.$VAR ?? ""
    pattern-not: process.env.$VAR || ""
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/vitest.config.*"
        - "**/jest.config.*"

  - id: dev-secret-fallback
    message: |
      Detected 'dev-' or 'test-' or 'changeme' fallback for a secret.
      This is the exact pattern that caused the HMAC bug in Adscory.
      Remove the fallback entirely — fail at startup if missing.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-regex: '(?i)(?:\|\||\?\?)\s*["''](dev-|test-|changeme|your-secret|default-secret|insecure|placeholder|replace-me|xxx)'
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"

  - id: hardcoded-api-key-pattern
    message: |
      Hardcoded API key detected in source. Move to env var.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-regex: '(?i)(api[_-]?key|apikey|secret[_-]?key|private[_-]?key)\s*[:=]\s*["''](?!process\.env)[A-Za-z0-9_-]{16,}["'']'
    paths:
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"

  - id: secret-in-logger
    message: |
      Logger statement appears to log a secret/token/password.
      Configure your logger with a redact config for these fields.
    severity: WARNING
    languages: [typescript, javascript]
    pattern-either:
      - pattern-regex: '(?i)(?:console\.|logger\.|log\.)[a-z]+\([^)]*(password|secret|token|api_key|authorization|cookie)'

  - id: process-env-check-missing-at-boot
    message: |
      Env var used deep in code without a boot-time check. Centralize validation
      in a config.ts that throws at import time if required vars are missing.
    severity: INFO
    languages: [typescript, javascript]
    pattern: process.env.$VAR
    paths:
      include:
        - "src/**"
      exclude:
        - "**/config.ts"
        - "**/env.ts"
        - "**/*.test.*"
        - "**/next.config.*"
