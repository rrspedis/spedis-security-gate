rules:
  - id: dangerously-set-inner-html-without-sanitize
    message: |
      dangerouslySetInnerHTML with non-sanitized content. XSS risk.
      Use DOMPurify.sanitize() or equivalent, or render as text.
    severity: ERROR
    languages: [typescript, javascript, tsx, jsx]
    patterns:
      - pattern-either:
          - pattern: |
              <$TAG dangerouslySetInnerHTML={{ __html: $X }} />
          - pattern: |
              <$TAG dangerouslySetInnerHTML={{ __html: $X }}>...</$TAG>
      - pattern-not: |
          <$TAG dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize($X) }} />
      - pattern-not: |
          <$TAG dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize($X, ...) }} />
      - pattern-not: |
          <$TAG dangerouslySetInnerHTML={{ __html: sanitize($X) }} />
      - pattern-not: |
          <$TAG dangerouslySetInnerHTML={{ __html: sanitize($X, ...) }} />
      - pattern-not: |
          <$TAG dangerouslySetInnerHTML={{ __html: purify.sanitize($X) }} />

  - id: document-write-user-input
    message: |
      document.write() with user-controlled input. XSS risk.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-either:
      - pattern: document.write($X)
      - pattern: document.writeln($X)

  - id: innerhtml-assignment-user-input
    message: |
      element.innerHTML assigned a value from user input. XSS risk.
      Use element.textContent for text, or sanitize first.
    severity: WARNING
    languages: [typescript, javascript]
    pattern-either:
      - pattern: $EL.innerHTML = $CTX.req.$X
      - pattern: |
          const $V = $CTX.req.$X;
          ...
          $EL.innerHTML = $V
      - pattern: $EL.innerHTML = req.body.$X

  - id: next-link-href-user-controlled
    message: |
      <a href> or <Link href> with user-controlled value and no URL validation.
      Can be weaponized as javascript: URI for XSS.
    severity: WARNING
    languages: [typescript, tsx, jsx]
    pattern-either:
      - pattern: <a href={$CTX.req.$X}>...</a>
      - pattern: <Link href={$CTX.req.$X}>...</Link>
